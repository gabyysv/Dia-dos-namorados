<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title> Para você ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Caveat:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ── FUNDO MAGENTA ── -->
  <div class="scene-bg" aria-hidden="true">
    <canvas id="bokehCanvas"></canvas>
    <div class="outline-hearts" id="outlineHearts"></div>
  </div>

  <!-- ══════════════════════════════════════════
       CENA 1 — PRESENTE
  ══════════════════════════════════════════ -->
  <section class="scene" id="sceneGift" aria-label="Presente">

    <p class="hint-text" id="hintPull" aria-live="polite"> Clique no laço...✨</p>

    <!-- SVG do presente completo -->
    <div class="gift-wrap" id="giftWrap">
      <svg id="giftSvg" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg" aria-label="Caixa de presente com laço">

        <!-- Sombra -->
        <ellipse cx="100" cy="210" rx="68" ry="10" fill="rgba(0,0,0,0.18)"/>

        <!-- CORPO da caixa -->
        <rect id="boxBody" x="20" y="110" width="160" height="100" rx="8"
              fill="#e53935" stroke="#b71c1c" stroke-width="2"/>

        <!-- Faixa vertical no corpo -->
        <rect x="88" y="110" width="24" height="100" fill="#fdd835" opacity="0.85"/>

        <!-- TAMPA da caixa (sai para cima na animação) -->
        <g id="boxLid">
          <rect x="14" y="95" width="172" height="28" rx="6"
                fill="#ef5350" stroke="#b71c1c" stroke-width="2"/>
          <!-- Faixa vertical na tampa -->
          <rect x="88" y="95" width="24" height="28" fill="#fdd835" opacity="0.85"/>
        </g>

        <!-- LÇO — corpo (duas alças) -->
        <g id="bowGroup">
          <!-- alça esquerda -->
          <ellipse id="bowLeft" cx="74" cy="85" rx="28" ry="18"
                   fill="#e91e8c" stroke="#880e4f" stroke-width="1.5"
                   transform="rotate(-25 74 85)"/>
          <!-- alça direita -->
          <ellipse id="bowRight" cx="126" cy="85" rx="28" ry="18"
                   fill="#e91e8c" stroke="#880e4f" stroke-width="1.5"
                   transform="rotate(25 126 85)"/>
          <!-- nó central -->
          <ellipse cx="100" cy="90" rx="14" ry="11"
                   fill="#f06292" stroke="#880e4f" stroke-width="1.5"/>
          <!-- pontinhos no nó -->
          <circle cx="100" cy="90" r="4" fill="#fce4ec" opacity="0.8"/>

          <!-- FITINHAS do laço (puxáveis) -->
          <line id="ribbon1" x1="100" y1="101" x2="82"  y2="115" stroke="#e91e8c" stroke-width="3" stroke-linecap="round"/>
          <line id="ribbon2" x1="100" y1="101" x2="118" y2="115" stroke="#e91e8c" stroke-width="3" stroke-linecap="round"/>
        </g>

        <!-- Corações decorativos no corpo -->
        <text x="45"  y="167" font-size="16" opacity="0.35" fill="#fce4ec">♥</text>
        <text x="138" y="185" font-size="12" opacity="0.30" fill="#fce4ec">♥</text>
        <text x="130" y="155" font-size="10" opacity="0.25" fill="#fce4ec">♥</text>

      </svg>
    </div>

    <!-- Corações saindo da caixa (aparecem após puxar) -->
    <div class="burst-hearts" id="burstHearts" aria-hidden="true"></div>
  </section>


  <!-- ══════════════════════════════════════════
       CENA 2 — ENVELOPE / CARTA
  ══════════════════════════════════════════ -->
  <section class="scene hidden" id="sceneLetter" aria-label="Carta">

    <p class="hint-text" id="hintOpen" aria-live="polite">Abra a carta 💌</p>

    <div class="envelope-wrap" id="envelopeWrap">
      <svg id="envelopeSvg" viewBox="0 0 240 180" xmlns="http://www.w3.org/2000/svg" aria-label="Envelope">

        <!-- Corpo do envelope -->
        <rect x="10" y="60" width="220" height="120" rx="10"
              fill="#fce4ec" stroke="#f48fb1" stroke-width="2"/>

        <!-- Aba traseira (fechada) -->
        <path id="flapBack" d="M10,60 L120,10 L230,60 Z"
              fill="#f8bbd0" stroke="#f48fb1" stroke-width="2"/>

        <!-- Dobras laterais (triângulos) -->
        <path d="M10,60 L120,130 L10,180 Z"  fill="#f48fb1" opacity="0.6"/>
        <path d="M230,60 L120,130 L230,180 Z" fill="#f48fb1" opacity="0.6"/>

        <!-- Dobra inferior -->
        <path d="M10,180 L120,130 L230,180 Z" fill="#f06292" opacity="0.5"/>

        <!-- Aba frontal (abre na animação) -->
        <path id="flapFront" d="M10,60 L120,120 L230,60 Z"
              fill="#f48fb1" stroke="#f06292" stroke-width="1.5"
              transform-origin="120 60"/>

        <!-- Lacre coração -->
        <circle cx="120" cy="108" r="16" fill="#e91e8c" stroke="#880e4f" stroke-width="1.5"/>
        <text x="120" y="114" text-anchor="middle" font-size="16" fill="#fff">♥</text>

        <!-- Linha decorativa -->
        <line x1="40" y1="148" x2="200" y2="148" stroke="#f48fb1" stroke-width="1" stroke-dasharray="4,4"/>
      </svg>
    </div>
  </section>


  <!-- ══════════════════════════════════════════
       CENA 3 — CARTA ABERTA / MENSAGEM
  ══════════════════════════════════════════ -->
  <section class="scene hidden" id="sceneCard" aria-label="Mensagem">

    <div class="stage" id="stage">
      <div class="falling-hearts" id="fallingHearts" aria-hidden="true"></div>

      <article class="card" id="card">

        <header class="card-header">
        <h1 class="card-title">Para você <span class="red-heart" aria-hidden="true">❤️</span></h1>
        </header>

        <p class="card-msg">
        Sua<br>
        mensagem .<br>
        aqui<br>
        ..
        </p>

        <!-- =====================================================
             FOTO DO CASAL
             DEV: coloque a imagem em  images/foto.jpg
             Tamanho recomendado: 300 × 220 px
             ===================================================== -->
        <div class="photo-frame">
          <img
            src="images/foto.jpg"
            alt="Foto do casal"
            class="couple-photo"
            onerror="this.parentElement.classList.add('photo-missing')"
          />
          <div class="photo-placeholder-overlay" aria-hidden="true">
            <span class="ph-icon">📷</span>
            <span class="ph-text">images/foto.jpg</span>
          </div>
        </div>

        <footer class="card-footer">
          <div class="footer-text" aria-hidden="true">
            Com amor, sempre. <br>
            nome aqui.
          </div>
        </footer>

      </article>

      <div class="stage-deco" id="stageDeco" aria-hidden="true"></div>
    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
